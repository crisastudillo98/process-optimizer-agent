[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marcadores personalizados
markers =
    integration: tests de integración real contra APIs externas (requieren .env)
    slow: tests lentos (> 5 segundos)

# Output detallado por defecto
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# Timeouts por tipo de test
timeout = 30