version: "3.9"

services:

  # ── Agente Principal ────────────────────────────────────────────────────────
  process-optimizer:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: process-optimizer-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - VECTOR_DB_PATH=/app/storage/vector_db
      - BPMN_OUTPUT_PATH=/app/storage/outputs/bpmn
      - REPORTS_OUTPUT_PATH=/app/storage/outputs/reports
      - LOG_LEVEL=INFO
    volumes:
      - bpmn_outputs:/app/storage/outputs/bpmn
      - reports_outputs:/app/storage/outputs/reports
      - vector_db_data:/app/storage/vector_db
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      - chromadb
    networks:
      - optimizer-net

  # ── Chroma Vector DB (servidor modo producción) ─────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: process-optimizer-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
      - ANONYMIZED_TELEMETRY=false
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - optimizer-net

  # ── Seed Service (corre una sola vez y termina) ────────────────────────────
  seed-knowledge:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: process-optimizer-seed
    env_file:
      - .env
    environment:
      - VECTOR_DB_PATH=/app/storage/vector_db
    volumes:
      - vector_db_data:/app/storage/vector_db
    command: ["python", "-m", "rag.seed_knowledge"]
    depends_on:
      - chromadb
    networks:
      - optimizer-net
    restart: "no"   # Solo corre una vez

# ── Volúmenes persistentes ──────────────────────────────────────────────────
volumes:
  bpmn_outputs:
  reports_outputs:
  vector_db_data:
  chroma_data:

# ── Red interna ─────────────────────────────────────────────────────────────
networks:
  optimizer-net:
    driver: bridge